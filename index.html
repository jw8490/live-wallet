<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SSA Web3Auth Polygon Test</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
  <script type="module">
    import { Web3Auth, WEB3AUTH_NETWORK } from "https://esm.sh/@web3auth/modal@10.10.0";
    window.Web3Auth = Web3Auth;
    window.WEB3AUTH_NETWORK = WEB3AUTH_NETWORK;
    window.dispatchEvent(new Event("sdk-ready"));
  </script>
  <style>
    body { margin:0; font-family: system-ui, Arial; background:#050505; color:#fff; display:grid; place-items:center; min-height:100vh; }
    .card { width:min(92vw,460px); background:#111; border:1px solid #333; border-radius:24px; padding:24px; }
    button { width:100%; border:0; border-radius:18px; padding:16px; font-weight:800; font-size:18px; background:#facc15; color:#111; }
    pre { white-space:pre-wrap; word-break:break-word; background:#000; border:1px solid #333; border-radius:14px; padding:14px; color:#d4d4d8; }
    .small { color:#aaa; font-size:13px; line-height:1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>SSA Wallet Test</h1>
    <p class="small">This only tests MetaMask Embedded Wallets / Web3Auth with Polygon. If this works, we put the same working code back into SSA.</p>
    <button id="login">Login with Web3Auth</button>
    <pre id="out">Ready.</pre>
  </div>
  <script>
    const out = document.getElementById('out');
    const log = (msg) => out.textContent = typeof msg === 'string' ? msg : JSON.stringify(msg, null, 2);
    const CLIENT_ID = "BOUKvoCqHa4GW_EG2Pnssa3i4g-TM280vCb70tlLfv5Vh5Flj9QYtkjeB8PfQ98CGw35IJROjOLPDQiOvmWEf4U";
    let web3auth;
    async function waitForSDK() {
      if (window.Web3Auth) return;
      await new Promise((resolve, reject) => {
        const t = setTimeout(() => reject(new Error('SDK did not load')), 10000);
        window.addEventListener('sdk-ready', () => { clearTimeout(t); resolve(); }, { once:true });
      });
    }
    async function start() {
      try {
        log('Loading SDK...');
        await waitForSDK();
        log('Initializing Web3Auth modal...');
        web3auth = new window.Web3Auth({
          clientId: CLIENT_ID,
          web3AuthNetwork: window.WEB3AUTH_NETWORK.SAPPHIRE_MAINNET,
          chainConfig: {
            chainNamespace: 'eip155',
            chainId: '0x89',
            rpcTarget: 'https://polygon-rpc.com',
            displayName: 'Polygon Mainnet',
            blockExplorerUrl: 'https://polygonscan.com',
            ticker: 'POL',
            tickerName: 'Polygon Ecosystem Token'
          },
          uiConfig: { appName: 'Shop Share Anywhere', mode: 'dark', loginMethodsOrder: ['google','email_passwordless'] }
        });
        if (typeof web3auth.initModal === 'function') await web3auth.initModal();
        else if (typeof web3auth.init === 'function') await web3auth.init();
        else throw new Error('No initModal/init method found');
        log('Opening login modal...');
        const provider = web3auth.provider || await web3auth.connect();
        if (!provider) throw new Error('No provider returned');
        const ethersProvider = new ethers.BrowserProvider(provider);
        const signer = await ethersProvider.getSigner();
        const address = await signer.getAddress();
        log('SUCCESS
Wallet: ' + address + '
Network: Polygon');
      } catch (e) {
        console.error(e);
        log('ERROR
' + (e && e.message ? e.message : String(e)));
      }
    }
    document.getElementById('login').addEventListener('click', start);
  </script>
</body>
</html>
