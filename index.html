
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SSA Wallet Base Withdraw Fix</title>
</head>
<body>
<script>
function showToast(msg){
  alert(msg);
}

window.ssaState = window.ssaState || {};

function withdrawCashout() {
  const address =
    (window.ssaState && ssaState.liveWalletAddress) ||
    localStorage.getItem("ssa-live-base-wallet-address") ||
    "";

  if (!address) {
    showToast("Connect wallet first.");
    return;
  }

  window.open("https://wallet.coinbase.com/assets", "_blank");
}

window.withdrawCashout = withdrawCashout;
</script>

<h1>SSA Wallet Withdraw Fix Installed</h1>
<button onclick="withdrawCashout()">Withdraw / Cash Out</button>

</body>
</html>
